name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0, v1.0.0-beta.1)'
        required: true
        type: string
      branch:
        description: 'Branch to release from (default: main)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

env:
  # JS actions still ship on Node 20; opt into Node 24 ahead of the
  # 2026-06-02 forced switch. Remove once all pinned actions are Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - name: Create and push tag (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.tag }}" -m "Release ${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"

      - name: Resolve tag and version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set crate version from tag
        shell: bash
        run: |
          python - "${{ needs.prepare.outputs.version }}" <<'PY'
          import re, sys
          ver = sys.argv[1]
          for f in ("crates/insmaller-core/Cargo.toml", "crates/insmaller-cli/Cargo.toml"):
              s = open(f, encoding="utf-8").read()
              s = re.sub(r'(?m)^version = ".*"$', f'version = "{ver}"', s, count=1)
              open(f, "w", encoding="utf-8").write(s)
          PY

      - name: Build
        run: cargo build --release --locked -p insmaller-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir dist
          bin="target/${{ matrix.target }}/release/insmaller"
          name="insmaller-${{ needs.prepare.outputs.tag }}-${{ matrix.target }}"
          tar -czf "dist/${name}.tar.gz" -C "$(dirname "$bin")" "$(basename "$bin")"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $bin = "target/${{ matrix.target }}/release/insmaller.exe"
          $name = "insmaller-${{ needs.prepare.outputs.tag }}-${{ matrix.target }}"
          Compress-Archive -Path $bin -DestinationPath "dist/$name.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: insmaller-${{ matrix.target }}
          path: dist/*

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: insmaller ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
