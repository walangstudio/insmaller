# Minimal, self-contained engine config for the demo (NO plugin packs, NO
# network). Inline-steps catalog entries need only [settings]; the `hello:`
# desugar below additionally shows the terse spec path.
[settings]
sentinel_dir_name = "insmaller-demo"
# Setup-TUI palette. "high-contrast" so `insmaller setup` visibly differs
# from the default. Override at runtime with NO_COLOR=1 or
# INSMALLER_THEME=mono, or uncomment `colors` for per-role hex.
theme = "high-contrast"
# colors = { accent = "#00afaf", accent_fg = "#000000", muted = "#5f5f5f", error = "#d70000" }
# Sibling files (relative to this toml) so callers pass only --config:
catalog = "demo.catalog.json"
wizard  = "demo.wizard.toml"

[[desugar]]
prefix = "hello:"
recipe = "hello"
parse  = "single_arg"

[[recipe]]
name = "hello"
[[recipe.install]]
type = "shell"
script = "echo hello-from-recipe {{ arg }}"

# ── 0.5.0 demos ──────────────────────────────────────────────────────────────
# Try:  insmaller --config examples/demo.installer.toml task reset
#       insmaller --config examples/demo.installer.toml task token
# (non-Windows: the script bodies below also work; cmd /C is Windows-only)

# Interactive confirm gate: prompts, aborts unless you type RESET exactly.
[task.reset]
[[task.reset.steps]]
type = "input"
name = "CONFIRM"
required = true
confirm = "RESET"
[[task.reset.steps]]
type = "shell"
script = "echo confirmed-reset"

# Masked secret: characters echo as `*`; the value never prints in plaintext.
[task.token]
[[task.token.steps]]
type = "prompt"
name = "API_TOKEN"
required = true
secret = true
[[task.token.steps]]
type = "shell"
script = "echo got a token of length {{ API_TOKEN | length }}"
